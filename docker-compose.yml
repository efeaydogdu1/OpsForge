services:
  postgres:
    image: postgres:16
    container_name: opsforge-postgres
    environment:
      POSTGRES_DB: opsforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opsforge"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: opsforge-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ApplyMigrationsOnStartup: "true"
      Seed__CreateDemoUser: "true"
      Seed__CreateDemoData: "true"
      Seed__DemoUser__Email: demo@opsforge.local
      Seed__DemoUser__DisplayName: Demo Admin
      Seed__DemoUser__Password: Demo123!
      Seed__DemoUser__Role: Admin
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=opsforge;Username=postgres;Password=postgres
      Jwt__Issuer: OpsForge
      Jwt__Audience: OpsForge
      Jwt__SecretKey: change-this-secret-key-at-least-32-chars
      Jwt__AccessTokenMinutes: 30
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: opsforge-frontend
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
